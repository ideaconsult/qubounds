executor: parallel

meta:
    extract_upstream: False

tasks:

# prepares files for pipeline.mapie.yaml
# input - training/test datasets extracted from VEGA 
# input - VEGA predictions for these datasets 
# output - datasets to serve as input to pipeline.mapie.yaml
# The files with predictions are available at https://zenodo.org/records/18444068
  - source: tasks/vega/conformal_prepare_vega_new.py
    name: "conformal_preparev_files"
    upstream: None
    product: 
      nb: "{{VEGA_DATA}}/vega/conformal_preparev_files.ipynb"
      regression: "{{VEGA_DATA}}/vega/regression"
      classification: "{{VEGA_DATA}}/vega/classification"
    params:
      vega_models: "resources/vega_models_withclasses.xlsx"
      vega_exported_sets: "{{VEGA_TRAINING_SETS}}"
      vega_reports: "{{VEGA_RESULT_FILES}}"
      prefix: "report_"
      # if not specified will apply to all datasets
      # dataset: ["BEE_KNN"]
