executor: serial

meta:
    extract_upstream: False

tasks:

# report_*.txt files from VEGA training/test sets
  - source: tasks/make_archive.py
    name: "make_archive_vega_reports"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_vega_reports.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_reports.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: [
                    "{{VEGA_RESULT_FILES}}" ]
      extensions_to_include: [".txt"]
      recursive: True

# resultsw_*.txt files from VEGA predictions on DSSTox v7
  - source: tasks/make_archive.py
    name: "make_archive_vega_reports_comptox"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_vega_reports_comptox.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_reports_comptox.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: [
                    "{{VEGA_REPORTS_INPUT}}" ]
      extensions_to_include: [".txt"]
      recursive: True

# VEGA predictions in a format appropriate for input to pipeline.mapie.yaml
  - source: tasks/make_archive.py
    name: "make_archive_vega"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_vega.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_datasets.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: [
                    "{{VEGA_DATA}}/vega/classification", "{{VEGA_DATA}}/vega/regression"]
      extensions_to_include: [".xlsx"]
      recursive: True

# Conformal prediction on VEGA training/test datasets 
# output of pipeline.mapie.yaml
  - source: tasks/make_archive.py
    name: "make_archive_mapie"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_mapie.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_mapie_conformal.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: ["{{CP_MODELS}}/mapie/vega/regression/rlgbmecfp", 
                    "{{CP_MODELS}}/mapie/vega/class_lac/cgbecfp"]
      extensions_to_include: [".xlsx"]
      recursive: True

# Conformal prediction on EPA CompTox dataset 
# classification
# output of pipeline.mapie.yaml
  - source: tasks/make_archive.py
    name: "make_archive_comptox_class_hard"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_comptox.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_comptox_conformal_class_hard.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: [
                    "{{VEGA_CP_OUTPUT}}/comptox/class_lac"]
      extensions_to_include: [".xlsx"]
      recursive: True

# Conformal prediction on EPA CompTox dataset 
# Regression
# output of pipeline.mapie.yaml
  - source: tasks/make_archive.py
    name: "make_archive_comptox_regr"
    upstream: []    
    product: 
      nb: "{{VEGA_ARCHIVE}}/make_archive_comptox_regr.ipynb"
      zip: "{{VEGA_ARCHIVE}}/vega_comptox_conformal_regression.zip"
    params:
      enabled: "{{enable_archive}}"
      folders_to_scan: ["{{VEGA_CP_OUTPUT}}/comptox/regression", 
                    ]
      extensions_to_include: [".xlsx"]
      recursive: True