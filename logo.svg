<svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .core { stroke: #111827; stroke-width: 3; fill: none; }
    .set  { fill: rgba(99,102,241,0.25); }
    .pt   { fill: #111827; }
  </style>

  <!-- central function -->
  <path class="core"
    d="M40 100
       C80 40, 120 160, 160 100
       C200 20, 240 180, 280 100
       C320 60, 360 140, 400 100
       C440 30, 480 170, 500 100"/>

  <!-- pointwise prediction sets (vertical intervals) -->
  <g>
    <rect class="set" x="70" y="70" width="20" height="60"/>
    <rect class="set" x="150" y="30" width="20" height="140"/>
    <rect class="set" x="230" y="20" width="20" height="160"/>
    <rect class="set" x="310" y="60" width="20" height="80"/>
    <rect class="set" x="390" y="80" width="20" height="40"/>
  </g>

  <!-- sampled points -->
  <g class="pt">
    <circle cx="80" cy="100" r="3"/>
    <circle cx="160" cy="100" r="3"/>
    <circle cx="240" cy="100" r="3"/>
    <circle cx="320" cy="100" r="3"/>
    <circle cx="400" cy="100" r="3"/>
  </g>

  <text x="40" y="40" font-size="30" font-family="Arial" fill="#111827" font-weight="600">
    qubounds
  </text>
  <text x="42" y="62" font-size="13" font-family="Arial" fill="#6B7280">
    conformal prediction sets
  </text>
</svg>