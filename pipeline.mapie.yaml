executor: parallel

meta:
    extract_upstream: False

tasks:

  - source: tasks/mapie.py
    name: "mapie_[[data]]_[[ncm]]"
    product: 
      nb: "products/mapie/vega/regression/[[ncm]]/[[data]]/mapie.ipynb"
      data: "products/mapie/vega/regression/[[ncm]]/[[data]]/mapie.xlsx"
      ncmodel: "products/mapie/vega/regression/[[ncm]]/[[data]]/mapie.pkl"
    params:
      input_folder: "products/vega/regression"
      alpha: 0.1
      calculate_coverage_metrics: True
      id: "Smiles"
      cache_path: "products/mapie/ecfp4_cache.db"
      skip_existing: True
    grid:
      ncm: ["rfecfp", "gbecfp", "knnecfp"]    
      data: "{{vega_regr}}"
      #ncm: ["knnecfp", "rfecfp", "gbecfp"]
 

  - source: tasks/mapiec.py
    name: "mapiec_[[data]]_[[ncm]]"
    product: 
      nb: "products/mapie/vega/{{class_folder}}/[[ncm]]/[[data]]/mapie.ipynb"
      data: "products/mapie/vega/{{class_folder}}/[[ncm]]/[[data]]/mapie.xlsx"
      ncmodel: "products/mapie/vega/{{class_folder}}/[[ncm]]/[[data]]/mapie.pkl"
    params:
      input_folder: "products/vega/classification"
      alpha: 0.1
      calculate_coverage_metrics: True
      id: "Smiles"
      cache_path: "products/mapie/ecfp4_cache.db"
      skip_existing: True
      vega_models: "resources/vega_models_withclasses.xlsx"      
    grid:
      ncm: ["crfecfp", "cmlpecfp", "cgbecfp", "chgbecfp", "cmordecfp", "ladecfp", "ogbecfp", "omlpecfp", "knnjecfp","cknnecfp","rfecfp","gbecfp"]  
      #data: ["ALGAE_COMBASECLASS"]
      data: "{{vega_class}}"



  - source: tasks/conformal_regression_summary.py
    name: "regression_summary_mapie"
    upstream: ["mapie_*"]
    product: 
      nb: "products/mapie/vega/regression/summary.ipynb"
      data: "products/mapie/vega/regression/summary.xlsx"        

  - source: tasks/conformal_classification_summary.py
    name: "classification_summary_mapie"
    upstream: ["mapiec_*"]
    product: 
      nb: "products/mapie/vega/{{class_folder}}/summary.ipynb"
      data: "products/mapie/vega/{{class_folder}}/summary.xlsx"              

  - source: tasks/mapie_class_analysis.py
    name: "mapie_class_analysis"
    upstream: ["classification_summary_mapie"]
    product: 
      nb: "products/mapie/vega/{{class_folder}}/mapie_class_analysis.ipynb"
      data: "products/mapie/vega/{{class_folder}}"
    params:
      alpha: 0.1    

  - source: tasks/mapie_apply.py
    name: "mapier_apply_[[input_key]]_[[data]]_[[ncm_code]]"
    upstream: ["regression_summary_mapie"]
    #upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}/[[input_key]]//regression/notebook_[[data]]_[[ncm_code]].ipynb"
      results: "{{VEGA_CP_OUTPUT}}/[[input_key]]/regression/report_cp_[[data]]_[[ncm_code]].xlsx"
    params:
      config: "{{config}}"
      cache_path: "products/ecfp4_cache.db"
      ncmodel: "products/mapie/vega/regression/{ncm_code}/{data}/*.pkl"
      skip_existing: True
    grid:
      #data: ["BCF_MEYLAN", "LOGP_MEYLAN","MELTING_POINT","MELTING_POINT_KNN","WS_IRFMN","ALGAE_COMBASEEC50"]
      data: "{{vega_regr}}"
      input_key: "{{input_key}}"
      ncm_code: ["rfecfp"]        


  - source: tasks/solr/chemicals.py
    name: "chemicals_[[input_key]]"
    upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}/[[input_key]]//chemicals.ipynb"
      results: "{{VEGA_CP_OUTPUT}}/[[input_key]]/chemicals.json"
    params:
      config: "{{config}}"
      cache_path: "products/ecfp4_cache.db"
    grid:
      input_key: "{{input_key}}"
