executor: serial

meta:
    extract_upstream: False

tasks:

  - source: tasks/mapie.py
    name: "mapie_[[data]]_[[ncm]]"
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/[[data]]/mapie.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/[[data]]/mapie.xlsx"
      ncmodel: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/[[data]]/mapie.pkl"
    params:
      input_folder: "{{VEGA_DATA}}/vega/regression"
      alpha: 0.1
      calculate_coverage_metrics: True
      id: "Smiles"
      cache_path: "{{CP_MODELS}}/mapie/ecfp4_cache.db"
      skip_existing: True
    grid:
      #ncm: ["rfecfp", "gbecfp", "knnecfp", "knnjecfp", "knnecfp2"]    
      ncm: ["rfecfp", "knn2ecfp", "rlgbmecfp"]    
      data: "{{vega_regr}}"
      #ncm: ["knnecfp", "rfecfp", "gbecfp"]
 

  - source: tasks/mapie_plot.py
    name: "mapieplot_regression_[[ncm]]"
    upstream: ["mapie_*"]    
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/mapie_plot.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/spearman.xlsx"
      plot: "{{CP_MODELS}}/mapie/vega/regression/[[ncm]]/spearman.png"
    params:
      input_folder: "{{VEGA_DATA}}/vega/regression"
      vega_models: "resources/vega_models_withclasses.xlsx"        
      mode: "regression"
      data: "{{vega_regr}}"
      data_: ["BCF_MEYLAN"]
    grid:
      #ncm: ["rfecfp","knnecfp", "gbecfp"]
      ncm: ["rfecfp", "knn2ecfp", "rlgbmecfp"] 

  - source: tasks/mapie_plot_class.py
    name: "mapieplot_classlac_[[ncm]]"
    upstream: ["mapiec_*"]    
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/mapie_plot.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/spearman.xlsx"
      plot: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/spearman.png"
    params:
      input_folder: "{{VEGA_DATA}}/vega/class_lac"
      vega_models: "resources/vega_models_withclasses.xlsx"        
      mode: "classification"
      data: "{{vega_class}}"
      data_: ["BCF_MEYLAN"]
    grid:
      ncm: ["crfecfp", "cgbecfp", "cknn2jecfp", "cmlpecfp","gbecfp", "rfecfp", "knn2jecfp"]
      #ncm: ["cgbecfp","crfecfp", "gbecfp", "rfecfp",  "knn2jecfp", "cknn2jecfp"]


  - source: tasks/mapie_plot_class.py
    name: "mapieplot_classproba_[[ncm]]"
    upstream: ["mapiecproba_*"]    
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/mapie_plot.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/classification_metrics.xlsx"
      plot: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/coverage_analysis.png"
    params:
      input_folder: "{{VEGA_DATA}}/vega/class_proba"
      vega_models: "resources/vega_models_withclasses.xlsx"        
      mode: "classification"
      data: "{{vega_class}}"
      data_: ["BCF_MEYLAN"]
    grid:
      #ncm: ["rfecfp","knnecfp", "gbecfp"]
      ncm: [None]


  - source: tasks/mapiec.py
    name: "mapiec_[[data]]_[[ncm]]"
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/[[data]]/mapie.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/[[data]]/mapie.xlsx"
      ncmodel: "{{CP_MODELS}}/mapie/vega/class_lac/[[ncm]]/[[data]]/mapie.pkl"
    params:
      input_folder: "{{VEGA_DATA}}/vega/classification"
      alpha: 0.1
      calculate_coverage_metrics: True
      id: "Smiles"
      cache_path: "{{CP_MODELS}}/mapie/ecfp4_cache.db"
      skip_existing: False
      vega_models: "resources/vega_models_withclasses.xlsx"
      method_score: "LAC"      
    grid:
      #ncm: ["cgbecfp","crfecfp", "gbecfp", "rfecfp",  "knn2jecfp", "cknn2jecfp"]
      ncm: ["crfecfp", "cgbecfp", "cknn2jecfp", "cmlpecfp","gbecfp", "rfecfp", "knn2jecfp"]
      # "crfecfp", "cknn2jecfp","rfecfp",, "knn2jecfp"]  
      #data: ["ALGAE_COMBASECLASS", "AROM_IRMFN", "AROM_TOX21", "BEE_KNN", "CARC_ANTARES"]
      data: "{{vega_class}}"


  - source: tasks/mapiec.py
    name: "mapiecproba_[[data]]_[[ncm]]"
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/[[data]]/mapie.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/[[data]]/mapie.xlsx"
      ncmodel: "{{CP_MODELS}}/mapie/vega/class_proba/[[ncm]]/[[data]]/mapie.pkl"
    params:
      input_folder: "{{VEGA_DATA}}/vega/classification"
      alpha: 0.1
      calculate_coverage_metrics: True
      id: "Smiles"
      cache_path: "{{CP_MODELS}}/mapie/ecfp4_cache.db"
      skip_existing: True
      vega_models: "resources/vega_models_withclasses.xlsx"
      prob_columns: "{{vega_class_plabel}}"
      method_score: "LAC_proba"      
    grid:
      ncm: ["None"]  
      #data: ["CARC_CAESAR"]
      #data: ["AROM_IRMFN"]
      data: "{{vega_pclass}}"


  - source: tasks/conformal_regression_summary.py
    name: "regression_summary_mapie"
    upstream: ["mapie_*"]
    params:
      vega_models: "resources/vega_models_withclasses.xlsx"    
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/regression/summary.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/regression/summary.xlsx"        

  - source: tasks/conformal_classification_summary.py
    name: "classification_summary_mapie"
    upstream: ["mapiec_*"]
    params:
      vega_models: "resources/vega_models_withclasses.xlsx"
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_lac/summary.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_lac/summary.xlsx"

  - source: tasks/conformal_classification_summary.py
    name: "classproba_summary_mapie"
    upstream: ["mapiecproba_*"]
    params:
      vega_models: "resources/vega_models_withclasses.xlsx"
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/class_proba/summary.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/class_proba/summary.xlsx"  
                          

  - source: tasks/mapie_class_analysis.py
    name: "mapieanalysis_class"
    upstream: ["classification_summary_mapie"]
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/classification/mapie_class_analysis.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/classification"
    params:
      alpha: 0.1
      #ncms_to_plot: ["cgbecfp","crfecfp", "gbecfp", "rfecfp",  "knn2jecfp", "cknn2jecfp", None]
      ncms_to_plot: ["crfecfp", "cgbecfp", "cknn2jecfp"]


  - source: tasks/mapie_regression_analysis.py
    name: "mapieanalysis_regr"
    upstream: ["regression_summary_mapie"]
    product: 
      nb: "{{CP_MODELS}}/mapie/vega/regression/mapie_regr_analysis.ipynb"
      data: "{{CP_MODELS}}/mapie/vega/regression"
    params:
      alpha: 0.1    


  - source: tasks/mapie_apply.py
    name: "regr_apply_[[input_key]]_[[data]]_[[ncm_code]]"
    upstream: ["regression_summary_mapie"]
    #upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}/[[input_key]]//regression/notebook_[[data]]_[[ncm_code]].ipynb"
      results: "{{VEGA_CP_OUTPUT}}/[[input_key]]/regression/report_cp_[[data]]_[[ncm_code]].xlsx"
    params:
      config: "{{config}}"
      cache_path: "{{CP_MODELS}}/mapie/ecfp4_cache.db"
      ncmodel: "{{CP_MODELS}}/mapie/vega/regression/{ncm_code}/{data}/*.pkl"
      skip_existing: True
      classification: False
      vega_models: "resources/vega_models_withclasses.xlsx"      
      enabled: False
    grid:
      #data: ["BCF_MEYLAN", "LOGP_MEYLAN","MELTING_POINT","MELTING_POINT_KNN","WS_IRFMN","ALGAE_COMBASEEC50"]
      data: "{{vega_regr}}"
      input_key: "{{input_key}}"
      #ncm_code: ["rfecfp"]        
      ncm_code: ["rlgbmecfp"]        


  - source: tasks/mapie_apply.py
    name: "class_apply_[[input_key]]_[[data]]_[[ncm_code]]"
    upstream: ["classification_summary_mapie"]
    #upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}/[[input_key]]//{{class_folder}}/notebook_[[data]]_[[ncm_code]].ipynb"
      results: "{{VEGA_CP_OUTPUT}}/[[input_key]]/{{class_folder}}/report_cp_[[data]]_[[ncm_code]].xlsx"
    params:
      config: "{{config}}"
      cache_path: "{{CP_MODELS}}/mapie/ecfp4_cache.db"
      ncmodel: "{{CP_MODELS}}/mapie/vega/{{class_folder}}/{ncm_code}/{data}/*.pkl"
      skip_existing: True
      classification: True
      vega_models: "resources/vega_models_withclasses.xlsx"      
      vega_class_plabel: "{{vega_class_plabel}}"
      enabled: True
    grid:
      #data: ["BCF_MEYLAN", "LOGP_MEYLAN","MELTING_POINT","MELTING_POINT_KNN","WS_IRFMN","ALGAE_COMBASEEC50"]
      data: "{{vega_class}}"
      input_key: "{{input_key}}"
      ncm_code: ["crfecfp"]        


  - source: tasks/mapie_apply_plot.py
    name: "outcome_plot_class"
    upstream: ["class_apply_*"]
    #upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}//results/class_lac/outcome_plot_class.ipynb"
      results: "{{VEGA_CP_OUTPUT}}//results/class_lac/uncertainty_domain_figure_global.png"
    params:
      classification: True
      ncm_code: "crfecfp"
      data: "{{vega_class}}"
      prefix: "class_apply_{{input_key}}_"
      max_files: 300
      


  - source: tasks/mapie_apply_plot.py
    name: "outcome_plot_regr"
    upstream: ["regr_apply_*", "regression_summary_mapie"]
    #upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}//results/regression/outcome_plot_regr.ipynb"
      results: "{{VEGA_CP_OUTPUT}}//results/regression/uncertainty_domain_figure_global.png"
    params:
      classification: False
      ncm_code: "rlgbmecfp"
      data: "{{vega_regr}}"
      prefix: "regr_apply_{{input_key}}_"
      max_files: 300    


  - source: tasks/solr/chemicals.py
    name: "chemicals_[[input_key]]"
    upstream: []
    product: 
      nb: "{{VEGA_CP_OUTPUT}}/[[input_key]]//chemicals.ipynb"
      results: "{{VEGA_CP_OUTPUT}}/[[input_key]]/chemicals.json"
    params:
      config: "{{config}}"
      cache_path: "{{VEGA_CP_OUTPUT}}/ecfp4_cache.db"
    grid:
      input_key: "{{input_key}}"


  - source: tasks/make_archive.py
    name: "make_archive_vega"
    upstream: []    
    product: 
      nb: "{{CP_MODELS}}/make_archive_vega.ipynb"
      zip: "{{VEGA_CP_OUTPUT}}/vega_datasets.zip"
    params:
      enabled: "{{enable_archive}}"
      #folders_to_scan: ["{{VEGA_CP_OUTPUT}}", "{{VEGA_CP_OUTPUT}}"]
      folders_to_scan: [
                    "{{VEGA_DATA}}/vega/classification", "{{VEGA_DATA}}/vega/regression"]
      #, "products/mapie/vega/regression/rlgbmecfp"]
      extensions_to_include: [".xlsx"]
      recursive: True


  - source: tasks/make_archive.py
    name: "make_archive_mapie"
    upstream: []    
    product: 
      nb: "{{CP_MODELS}}/make_archive_mapie.ipynb"
      zip: "{{VEGA_CP_OUTPUT}}/vega_mapie_conformal.zip"
    params:
      enabled: "{{enable_archive}}"
      #folders_to_scan: ["{{VEGA_CP_OUTPUT}}", "{{VEGA_CP_OUTPUT}}"]
      folders_to_scan: ["{{CP_MODELS}}/mapie/vega/regression/rlgbmecfp", 
                    "{{CP_MODELS}}/mapie/vega/class_lac/crfecfp"]
      #, "products/mapie/vega/regression/rlgbmecfp"]
      extensions_to_include: [".xlsx"]
      recursive: True


  - source: tasks/make_archive.py
    name: "make_archive_comptox_class_hard"
    upstream: []    
    product: 
      nb: "{{CP_MODELS}}/make_archive_comptox.ipynb"
      zip: "{{VEGA_CP_OUTPUT}}/vega_comptox_conformal_class_hard.zip"
    params:
      enabled: "{{enable_archive}}"
      #folders_to_scan: ["{{VEGA_CP_OUTPUT}}", "{{VEGA_CP_OUTPUT}}"]
      folders_to_scan: [
                    "{{VEGA_CP_OUTPUT}}/comptox/class_lac"]
      #, "products/mapie/vega/regression/rlgbmecfp"]
      extensions_to_include: [".xlsx"]
      recursive: True

  - source: tasks/make_archive.py
    name: "make_archive_comptox_regr"
    upstream: []    
    product: 
      nb: "{{CP_MODELS}}/make_archive_comptox_regr.ipynb"
      zip: "{{VEGA_CP_OUTPUT}}/vega_comptox_conformal_regression.zip"
    params:
      enabled: "{{enable_archive}}"
      #folders_to_scan: ["{{VEGA_CP_OUTPUT}}", "{{VEGA_CP_OUTPUT}}"]
      folders_to_scan: ["{{VEGA_CP_OUTPUT}}/comptox/regression", 
                    ]
      #, "products/mapie/vega/regression/rlgbmecfp"]
      extensions_to_include: [".xlsx"]
      recursive: True