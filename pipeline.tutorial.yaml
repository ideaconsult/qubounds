executor: serial

meta:
  extract_upstream: False

tasks:

  # ── Regression: load dataset ────────────────────────────────────────────────
  - source: tasks/tutorial/load_dataset.py
    name: "tutorial_load_[[dataset]]"
    product:
      nb:    "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/00_load.{{report_format}}"
      train: "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/data_train.xlsx"
      test:  "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/data_test.xlsx"
      meta:  "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/meta.json"
    params:
      test_size:      0.2
      random_state:   42
      cache_path:     "{{TUTORIAL_CACHE}}"
      dataset_config: "{{tutorial_regr_datasets}}"
    grid:
      dataset: "{{tutorial_regr_datasets}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"


  # ── Regression: internal base model, adaptive + plain CP, tutorial plots ────
  - source: tasks/tutorial/mapie_native.py
    name: "tutorial_native_[[dataset]]_[[ncm]]"
    upstream: ["tutorial_load_*"]
    product:
      nb:               "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/01_native_[[ncm]].{{report_format}}"
      data:             "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/native_[[ncm]].xlsx"
      ncmodel_adaptive: "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/native_[[ncm]]_adaptive.pkl"
      ncmodel_plain:    "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/native_[[ncm]]_plain.pkl"
    params:
      alpha:          "{{tutorial_alpha}}"
      cache_path:     "{{TUTORIAL_CACHE}}"
      dataset_config: "{{tutorial_regr_datasets}}"
    grid:
      dataset: "{{tutorial_regr_datasets}}"
      ncm:     "{{tutorial_ncm}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"


  # ── Regression: external predictions + AD comparison ────────────────────────
  #    Reads pred_file, ad_cols, ad_col_directions from dataset_config[dataset].
  #    AD comparison is embedded here (not a separate task) because AD metrics
  #    come from the same external file as the predictions.
  - source: tasks/tutorial/mapie_external.py
    name: "tutorial_external_[[dataset]]_[[ncm]]"
    upstream: ["tutorial_load_*"]
    product:
      nb:               "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/02_external_[[ncm]].{{report_format}}"
      data:             "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/external_[[ncm]].xlsx"
      ncmodel_adaptive: "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/external_[[ncm]]_adaptive.pkl"
      ncmodel_plain:    "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/external_[[ncm]]_plain.pkl"
    params:
      alpha:          "{{tutorial_alpha}}"
      cache_path:     "{{TUTORIAL_CACHE}}"
      dataset_config: "{{tutorial_regr_datasets}}"
    grid:
      dataset: "{{tutorial_regr_datasets}}"
      ncm:     "{{tutorial_ncm}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"


  # ── Regression: compare native vs external variants ─────────────────────────
  - source: tasks/tutorial/compare_variants.py
    name: "tutorial_compare_[[dataset]]_[[ncm]]"
    upstream: ["tutorial_native_*", "tutorial_external_*", "tutorial_load_*"]
    product:
      nb:           "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/03_compare_[[ncm]].{{report_format}}"
      data:         "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/compare_[[ncm]].xlsx"
      plot_summary: "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/compare_coverage_width_[[ncm]].png"
      plot_width:   "{{TUTORIAL_OUTPUT}}/regression/[[dataset]]/compare_width_dist_[[ncm]].png"
    params:
      alpha:   "{{tutorial_alpha}}"
    grid:
      dataset: "{{tutorial_regr_datasets}}"
      ncm:     "{{tutorial_ncm}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"


  # ── Classification: load dataset ────────────────────────────────────────────
  - source: tasks/tutorial/load_dataset_classification.py
    name: "tutorial_load_class_[[dataset]]"
    product:
      nb:    "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/00_load.{{report_format}}"
      train: "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/data_train.xlsx"
      test:  "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/data_test.xlsx"
      meta:  "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/meta.json"
    params:
      smiles_col:     "smiles"
      target_col:     null
      test_size:      0.2
      random_state:   42
      cache_path:     "{{TUTORIAL_CACHE}}"
      dataset_config: "{{tutorial_class_datasets}}"
    grid:
      dataset: "{{tutorial_class_datasets}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"


  # ── Classification: conformal classifier (LAC + NCM), tutorial plots ────────
  - source: tasks/tutorial/mapie_classification.py
    name: "tutorial_classify_[[dataset]]_[[ncm]]"
    upstream: ["tutorial_load_class_*"]
    product:
      nb:      "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/01_classify_[[ncm]].{{report_format}}"
      data:    "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/classify_[[ncm]].xlsx"
      ncmodel: "{{TUTORIAL_OUTPUT}}/classification/[[dataset]]/classify_[[ncm]].pkl"
    params:
      alpha:          "{{tutorial_alpha}}"
      cache_path:     "{{TUTORIAL_CACHE}}"
      dataset_config: "{{tutorial_class_datasets}}"
    grid:
      dataset: "{{tutorial_class_datasets}}"
      ncm:     "{{tutorial_class_ncm}}"
    nbconvert_export_kwargs:
      exclude_input: "{{report_exclude_code}}"
