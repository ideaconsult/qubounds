# env.tutorial.yaml
# Configuration for pipeline.tutorial.yaml
#
# All dataset-specific settings (path, columns, external predictions, AD indices)
# live inside the dataset entry.  The tutorial tasks receive the full config dict
# and look up their own key -- no global flat AD parameters needed.

# ── Regression datasets ───────────────────────────────────────────────────────
# Required per dataset:
#   path         : URL or local file path (.csv / .xlsx)
#   target_col   : column name of the measured endpoint
#   smiles_col   : column name of the SMILES
#
# Optional (external predictions + AD comparison):
#   pred_file           : path to Excel/CSV that contains model predictions AND
#                         pre-computed AD indices for test-set molecules.
#                         Columns must include smiles_col + the columns below.
#   pred_col            : column with external model predictions (default "Pred")
#   interval_width_col  : CP interval width column (default "Width_adaptive")
#   covered_col         : CP covered indicator  (default "Covered_adaptive")
#   ad_cols             : list of AD column names in pred_file
#   ad_col_directions   : "similarity" (higher = more reliable, e.g. ADI)
#                         or "distance" (higher = less reliable, e.g. leverage)
#   n_quantile_bins     : number of AD quantile bins for stratified plots (default 5)
#
# Example with VEGA predictions + ADI:
#   tpyriformis:
#     path: "resources/toxicity_against_t_pyriformis.csv"
#     target_col: "log(IGC50-1) {measured, converted}"
#     smiles_col: "SMILES"
#     pred_col:   "Pred"
#     interval_width_col: "Width_adaptive"
#     covered_col:        "Covered_adaptive"
#     ad_cols:       ["ADI"]
#     ad_col_directions: ["similarity"]
#     n_quantile_bins: 5

tutorial_regr_datasets:
  esol:
    path: "https://raw.githubusercontent.com/deepchem/deepchem/refs/heads/master/datasets/delaney-processed.csv"
    target_col: "measured log solubility in mols per litre"
    smiles_col: "smiles"
    pred_col: None
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: None
    split_train_value: None
    split_test_value: None    
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5

  lipo:
    path: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/Lipophilicity.csv"
    target_col: "exp"
    smiles_col: "smiles"
    pred_col: None
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: None
    split_train_value: None
    split_test_value: None
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5

  tpyriformis:
    path: "resources/toxicity_against_t_pyriformis.csv"
    target_col: "log(IGC50-1) {measured, converted}"
    smiles_col: "SMILES"
    pred_col: "log(IGC50-1) {predicted by ochem.eu/model/3 in -log(mmol/L)}"
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: "Dataset"
    split_train_value: "Train"
    split_test_value: ["Test 1", "Test 2"]    
    ad_cols: ["ASNN-STDEV{log(IGC50-1) by Toxicity against T. Pyriformis}", "ASNN-CORREL{log(IGC50-1) by Toxicity against T. Pyriformis}"]              # e.g. ["ADI", "OPERA_accuracy"]
    ad_col_directions: ["distance", "similarity"]
    software: "OCHEM"
#If AD is distance-based → higher AD = more out-of-domain → wider intervals    
#If AD is similarity-based → higher AD = more reliable → narrower intervals
    n_quantile_bins: 5

  bcfmeylan:
    path: "resources/BCF_MEYLAN.xlsx"
    target_col: "Log BCF exp"
    smiles_col: "Smiles"
    pred_col: "Predicted BCF [log(L/kg)]"
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: "Status"
    split_train_value: "TRAINING"
    split_test_value: ["TEST"]    
    ad_cols: ["ADI", "LogP reliability"]    
    ad_col_directions: ["similarity", "similarity"]
    n_quantile_bins: 5
    software: "VEGA"

  zebrafish_coral:
    path: "resources/ZEBRAFISH_CORAL.xlsx"
    target_col: "Exp value [log(uM)]"
    smiles_col: "Smiles"
    pred_col: "Predicted AC50 [log(umol/l)]"
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: "Status"
    split_train_value: "TRAINING"
    split_test_value: ["TEST"]    
    ad_cols: ["ADI", "Accuracy index", "Concordance index", "Max error index"]    
    ad_col_directions: ["similarity", "similarity","similarity", "similarity"]
    n_quantile_bins: 5   
    software: "VEGA"

  henry_opera:
    path: "resources/HENRY_OPERA.xlsx"
    target_col: "EXP (Log atm-m3/mole)"
    smiles_col: "Smiles"
    pred_col: "Predicted Henry's law [log atm-m3/mole]"
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    split_col: "Status"
    split_train_value: "TRAINING"
    split_test_value: ["TEST"]    
    ad_cols: ["ADI", "Accuracy index", "Concordance index", "Max error index"]    
    ad_col_directions: ["similarity", "similarity","similarity", "similarity"]
    n_quantile_bins: 5
    software: "VEGA"  

# ── Classification datasets ───────────────────────────────────────────────────
# Same structure as regression.  Built-in keys: bbbp, clintox.
#
# Additional classification-specific optional columns:
#   set_size_col_a : set size for Approach A / LAC  (default "SetSize_A")
#   set_size_col_b : set size for Approach B / NCM  (default "SetSize_B")
#   covered_col_a  : covered indicator Approach A   (default "Cov_A")
#   covered_col_b  : covered indicator Approach B   (default "Cov_B")

tutorial_class_datasets:
# Blood-Brain Barrier Permeability (Martins et al. 2012) from DeepChem S3.
  bbbp:
    path: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/BBBP.csv"
    target_col: "p_np"
    target_descr: "Blood-Brain Barrier Permeability"
    smiles_col: "smiles"
    pred_col: null
    set_size_col_a: "SetSize_A"
    set_size_col_b: "SetSize_B"
    covered_col_a: "Cov_A"
    covered_col_b: "Cov_B"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5
    classes:
      "0" : "non-permeable"
      "1" : "permeable"    

 # ClinTox (Gayvert et al. 2016) from DeepChem S3.
  clintox:
    path: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/clintox.csv.gz"
    target_col: "FDA_APPROVED"
    smiles_col: "smiles"
    pred_col: null
    set_size_col_a: "SetSize_A"
    set_size_col_b: "SetSize_B"
    covered_col_a: "Cov_A"
    covered_col_b: "Cov_B"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5
    classes:
      "0": "not_approved"
      "1": "approved"

  ames_ochem:
    path: "resources/ames_levenberg.csv"
    target_col: "AMES {measured}"
    smiles_col: "SMILES"
    pred_col: "AMES {predicted by ochem.eu/model/1}"
    set_size_col_a: "SetSize_A"
    set_size_col_b: "SetSize_B"
    covered_col_a: "Cov_A"
    covered_col_b: "Cov_B"
    ad_cols: ["PROB-STD{AMES by Ames levenberg}", "ASNN-STDEV{AMES by Ames levenberg}", "CLASS-LAG{AMES by Ames levenberg}", "ASNN-CORREL{AMES by Ames levenberg}"]
    ad_col_directions: ["similarity", "similarity", "similarity", "similarity"]
    n_quantile_bins: 5
    split_col: "Dataset"
    split_train_value: "Train"
    split_test_value: ["Test"]       
    classes:
      "0": "inactive"
      "1": "active"

# ── CP parameters ─────────────────────────────────────────────────────────────
tutorial_alpha: 0.1

# ── Sigma model for regression ────────────────────────────────────────────────
tutorial_ncm:
  - rlgbmecfp

# ── NCM model for classification ──────────────────────────────────────────────
tutorial_class_ncm:
  - crfecfp

# ── Base model for external regression variant ────────────────────────────────
tutorial_base_models:
  - lgbm

# ── Output paths ──────────────────────────────────────────────────────────────
TUTORIAL_OUTPUT: "products/tutorial"
TUTORIAL_CACHE:  "products/tutorial/ecfp4_cache.db"

report_format: "ipynb"
report_exclude_code: True
