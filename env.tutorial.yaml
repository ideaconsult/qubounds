# env.tutorial.yaml
# Configuration for pipeline.tutorial.yaml
#
# All dataset-specific settings (path, columns, external predictions, AD indices)
# live inside the dataset entry.  The tutorial tasks receive the full config dict
# and look up their own key -- no global flat AD parameters needed.

# ── Regression datasets ───────────────────────────────────────────────────────
# Required per dataset:
#   path         : URL or local file path (.csv / .xlsx)
#   target_col   : column name of the measured endpoint
#   smiles_col   : column name of the SMILES
#
# Optional (external predictions + AD comparison):
#   pred_file           : path to Excel/CSV that contains model predictions AND
#                         pre-computed AD indices for test-set molecules.
#                         Columns must include smiles_col + the columns below.
#   pred_col            : column with external model predictions (default "Pred")
#   interval_width_col  : CP interval width column (default "Width_adaptive")
#   covered_col         : CP covered indicator  (default "Covered_adaptive")
#   ad_cols             : list of AD column names in pred_file
#   ad_col_directions   : "similarity" (higher = more reliable, e.g. ADI)
#                         or "distance" (higher = less reliable, e.g. leverage)
#   n_quantile_bins     : number of AD quantile bins for stratified plots (default 5)
#
# Example with VEGA predictions + ADI:
#   tpyriformis:
#     path: "resources/toxicity_against_t_pyriformis.csv"
#     target_col: "log(IGC50-1) {measured, converted}"
#     smiles_col: "SMILES"
#     pred_file:  "products/vega/TPYRIFORMIS/predictions.xlsx"
#     pred_col:   "Pred"
#     interval_width_col: "Width_adaptive"
#     covered_col:        "Covered_adaptive"
#     ad_cols:       ["ADI"]
#     ad_col_directions: ["similarity"]
#     n_quantile_bins: 5

tutorial_regr_datasets:
  esol:
    path: "https://raw.githubusercontent.com/deepchem/deepchem/refs/heads/master/datasets/delaney-processed.csv"
    target_col: "measured log solubility in mols per litre"
    smiles_col: "smiles"
    pred_col: "Pred"
    pred_file: null
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5

  lipo:
    path: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/Lipophilicity.csv"
    target_col: "exp"
    smiles_col: "smiles"
    pred_col: "Pred"
    pred_file: null
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5

  tpyriformis:
    path: "resources/toxicity_against_t_pyriformis.csv"
    target_col: "log(IGC50-1) {measured, converted}"
    smiles_col: "SMILES"
    pred_col: "log(IGC50-1) {predicted by ochem.eu/model/3 in -log(mmol/L)}"
    pred_file: "resources/toxicity_against_t_pyriformis.csv"
    interval_width_col: "Width_adaptive"
    covered_col: "Covered_adaptive"
    ad_cols: ["ASNN-STDEV{log(IGC50-1) by Toxicity against T. Pyriformis}"]              # e.g. ["ADI", "OPERA_accuracy"]
    ad_col_directions: ["similarity"]    # e.g. ["similarity", "similarity"]
#If AD is similarity-based → higher AD = more reliable → narrower intervals
#If AD is distance-based → higher AD = more out-of-domain → wider intervals    
    n_quantile_bins: 5


# ── Classification datasets ───────────────────────────────────────────────────
# Same structure as regression.  Built-in keys: bbbp, clintox.
#
# Additional classification-specific optional columns:
#   set_size_col_a : set size for Approach A / LAC  (default "SetSize_A")
#   set_size_col_b : set size for Approach B / NCM  (default "SetSize_B")
#   covered_col_a  : covered indicator Approach A   (default "Cov_A")
#   covered_col_b  : covered indicator Approach B   (default "Cov_B")

tutorial_class_datasets:
  bbbp:
    path: "bbbp"
    target_col: null
    smiles_col: "smiles"
    pred_col: "Pred"
    pred_file: null
    set_size_col_a: "SetSize_A"
    set_size_col_b: "SetSize_B"
    covered_col_a: "Cov_A"
    covered_col_b: "Cov_B"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5

  clintox:
    path: "clintox"
    target_col: null
    smiles_col: "smiles"
    pred_col: "Pred"
    pred_file: null
    set_size_col_a: "SetSize_A"
    set_size_col_b: "SetSize_B"
    covered_col_a: "Cov_A"
    covered_col_b: "Cov_B"
    ad_cols: []
    ad_col_directions: []
    n_quantile_bins: 5


# ── CP parameters ─────────────────────────────────────────────────────────────
tutorial_alpha: 0.1

# ── Sigma model for regression ────────────────────────────────────────────────
tutorial_ncm:
  - rlgbmecfp

# ── NCM model for classification ──────────────────────────────────────────────
tutorial_class_ncm:
  - crfecfp

# ── Base model for external regression variant ────────────────────────────────
tutorial_base_models:
  - lgbm

# ── Output paths ──────────────────────────────────────────────────────────────
TUTORIAL_OUTPUT: "products/tutorial"
TUTORIAL_CACHE:  "products/tutorial/ecfp4_cache.db"

report_format: "ipynb"
report_exclude_code: True
