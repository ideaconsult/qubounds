# env.tutorial.yaml
# Configuration for pipeline.tutorial.yaml
# Override on the command line:
#   ploomber build --entry-point pipeline.tutorial.yaml --env-file env.tutorial.yaml --env--tutorial_alpha 0.05

# Regression datasets (built-in: esol, lipo; or path to csv/xlsx)
tutorial_regr_datasets:
  esol:
      path: "https://raw.githubusercontent.com/deepchem/deepchem/refs/heads/master/datasets/delaney-processed.csv"
      target_col: "measured log solubility in mols per litre"
      smiles_col: "smiles"
  lipo:
      path: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/Lipophilicity.csv"
      target_col: "exp"
      smiles_col: "smiles"    
  tpyriformis:
      path: "resources/toxicity_against_t_pyriformis.csv"
      target_col: "log(IGC50-1) {measured, converted}"
      smiles_col: "SMILES"
# target: lipophilicity    
  

# Classification datasets (built-in: bbbp, clintox; or path to csv/xlsx)
tutorial_class_datasets:
  - bbbp
  - clintox

# Miscoverage level: 0.1 -> 90% coverage target
tutorial_alpha: 0.1

# Sigma model for regression (rlgbmecfp = LightGBM Huber, rfecfp = RF, knn2ecfp = kNN)
tutorial_ncm:
  - rlgbmecfp

# NCM model for classification (crfecfp = RF classifier, cgbecfp = GBT classifier)
tutorial_class_ncm:
  - crfecfp

# Base model type for the external (pre-fitted) variant
tutorial_base_models:
  - lgbm

# Output root directory for all tutorial products
TUTORIAL_OUTPUT: "products/tutorial"

# Path to ECFP SQLite fingerprint cache (shared with main pipeline if desired)
TUTORIAL_CACHE:  "products/tutorial/ecfp4_cache.db"


report_format: "ipynb"  # html or ipynb
report_exclude_code: True